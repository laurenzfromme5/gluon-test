on:
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'laurenzfromme5/gluon-samples'
          
          
      - uses: gluonhq/setup-graalvm@master
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'
          arch: aarch64
          #arch: x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - working-directory: ./HelloGluon
        run: |
          java -version
          javac -version
          mvn -Pios gluonfx:build
