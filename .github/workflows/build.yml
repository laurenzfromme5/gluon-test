on:
  workflow_dispatch:
jobs:
  build:  #build-ios:
    runs-on: macos-latest
    steps:
      - uses: gluonhq/setup-graalvm@master
        #with:
          #graalvm: '22.1.0.1-Final'
          #jdk: 'java17'
          #arch: aarch64
          #arch: x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: actions/checkout@v4
        with:
          repository: 'laurenzfromme5/gluon-samples'
          
      - working-directory: ./HelloGluon
        run: |
          java -version
          javac -version
          grep -R --line-number -E "21|--release|maven.compiler.release|maven.compiler.source|maven.compiler.target|sourceCompatibility|targetCompatibility|languageVersion|release" || true
          mvn -N io.takari:maven:wrapper -Dmaven=3.8.8
          ./mvnw -v
          rm -rf target
          ./mvnw -U clean package
          ./mvnw -Pdesktop gluonfx:build gluonfx:package
          
