on:
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'gluonhq/gluon-samples'
          # ref: 'a9f84062bcca01372dba5eb6438e1cd119fe6277'
          fetch-depth: 0
      - uses: gluonhq/setup-graalvm@master
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'
          #arch: aarch64
          #arch: x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - working-directory: ./HelloGluon
        run: |
          java -version
          javac -version
          ./mvnw -Pios gluonfx:build
